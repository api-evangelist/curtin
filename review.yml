  - date: '2026-06-03'
    rating: 2
    summary: >-
      Curtin University (QS World 2025 #174) has no centralized public developer
      portal or documented general-purpose API program. Confirmed live: the
      espace institutional repository (Ex Libris Primo/Esploro), the
      data.curtin.edu.au landing page (a static S3/CloudFront-served page, not
      an open-data API), and Curtin's contributor presence in the national
      Research Data Australia registry. The historically cited OAI-PMH endpoint
      (OAI-PUB/2) now redirects into the Primo discovery layer rather than
      serving OAI-PMH, so no current documented public harvest endpoint could be
      independently verified. Department-level GitHub orgs exist but there is no
      single official Curtin org. No api.* or developer.* subdomain and no
      public status page resolved. No endpoints were fabricated; entries reflect
      only what was probed live.
