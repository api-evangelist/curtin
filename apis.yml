apis:
  - aid: curtin:espace
    name: Curtin espace Institutional Repository
    description: >-
      espace is Curtin University's open-access institutional repository of
      research publications and higher-degree-by-research theses, delivered on
      the Ex Libris Primo/Esploro discovery platform. Historically the
      repository exposed an OAI-PMH harvesting interface for metadata; the
      legacy endpoint now redirects into the Primo discovery layer and no
      current public, documented API endpoint could be independently confirmed
      during this review.
    humanURL: https://espace.curtin.edu.au/
    tags: [ Repository, Research, Library, OAI-PMH, Metadata ]
    properties:
      - type: Documentation
        url: https://espace.curtin.edu.au/
  - aid: curtin:researchdata
    name: Curtin Research Data (via Research Data Australia)
    description: >-
      Curtin University publishes research data collection records through the
      national Research Data Australia (RDA) registry operated by the Australian
      Research Data Commons (ARDC). Curtin's records are discoverable and
      harvestable through RDA's platform-level interfaces; Curtin itself does
      not operate a documented public data API for this collection.
    humanURL: https://researchdata.edu.au/contributors/curtin-university
    tags: [ Research, Open Data, Datasets, Metadata ]
    properties:
      - type: Documentation
        url: https://researchdata.edu.au/contributors/curtin-university
