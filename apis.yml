---
aid: curtin
name: Curtin University
description: >-
  Curtin University is a public research university based in Perth, Western
  Australia, and is ranked #174 in the QS World University Rankings 2025. Curtin
  operates an institutional research repository (espace, built on Ex Libris
  Primo/Esploro), contributes datasets to the national Research Data Australia
  registry, and maintains several department-level open-source GitHub
  organizations. As of this review Curtin does not publish a centralized public
  developer portal or a documented general-purpose API program; the developer
  footprint is limited to library/repository discovery platforms and
  research-data harvesting interfaces operated through third-party platforms.
